glob_matcher: doublestar

pre-commit:
  parallel: true
  jobs:
    - name: sync skills
      glob:
        - '.claude/skills/**'
      run: pnpm run sync:skills
      stage_fixed: true

    - name: config schema
      glob:
        - apps/ccusage/package.json
        - rust/crates/ccusage/src/config_schema.rs
        - rust/crates/ccusage/src/bin/generate_config_schema.rs
      run: pnpm --filter ccusage run generate:schema
      stage_fixed: true

    - name: oxfmt
      glob: '**/*'
      run: pnpm exec oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true

    - name: rustfmt
      glob: 'rust/**/*.rs'
      run: rustfmt {staged_files}
      stage_fixed: true

    - name: eslint
      group:
        parallel: true
        jobs:
          - name: root
            glob: '*.{ts,tsx,js,jsx,mjs,cjs}'
            exclude:
              - 'apps/**'
              - 'packages/**'
              - 'docs/**'
            run: pnpm exec eslint --cache --fix --no-warn-ignored {staged_files}
            stage_fixed: true
          - name: ccusage
            root: apps/ccusage/
            glob: '*.{ts,tsx,js,jsx,mjs,cjs}'
            run: pnpm exec eslint --cache --fix --no-warn-ignored {staged_files}
            stage_fixed: true
          - name: docs
            root: docs/
            glob: '*.{ts,tsx,js,jsx,mjs,cjs}'
            run: pnpm exec eslint --cache --fix --no-warn-ignored {staged_files}
            stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - name: lint
      group:
        parallel: true
        jobs:
          - name: oxfmt
            glob: '**/*'
            run: pnpm exec oxfmt --check .
          - name: eslint root
            glob: '*.{ts,tsx,js,jsx,mjs,cjs}'
            exclude:
              - 'apps/**'
              - 'packages/**'
              - 'docs/**'
            run: pnpm exec eslint --cache eslint.config.js .
          - name: eslint ccusage
            root: apps/ccusage/
            glob: '*.{ts,tsx,js,jsx,mjs,cjs}'
            run: pnpm exec eslint --cache .
          - name: eslint docs
            root: docs/
            glob: '*.{ts,tsx,js,jsx,mjs,cjs}'
            run: pnpm exec eslint --cache .
          - name: clippy
            glob: 'rust/**/*.rs'
            run: cargo clippy --manifest-path rust/Cargo.toml --workspace --all-targets -- -D warnings

    - name: vitest related
      glob: '*.{ts,tsx,js,jsx,mjs,cjs}'
      run: pnpm vitest related --run {push_files}
