glob_matcher: doublestar

pre-commit:
  parallel: true
  jobs:
    - name: sync skills
      glob:
        - '.claude/skills/**'
      run: pnpm run sync:skills
      stage_fixed: true

    - name: config schema
      glob:
        - apps/ccusage/package.json
        - rust/crates/ccusage/src/config_schema.rs
        - rust/crates/ccusage/src/bin/generate_config_schema.rs
      run: pnpm --filter ccusage run generate:schema
      stage_fixed: true

    - name: oxfmt
      glob: '**/*'
      run: oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true

    - name: typos
      glob: '**/*'
      run: typos --config ./typos.toml --force-exclude {staged_files}

    - name: gitleaks
      run: gitleaks protect --staged --config .gitleaks.toml

    - name: rustfmt
      glob: 'rust/**/*.rs'
      run: rustfmt {staged_files}
      stage_fixed: true

    - name: oxlint
      glob: '**/*.{ts,tsx,js,jsx,mjs,cjs}'
      run: oxlint --fix {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - name: lint
      group:
        parallel: true
        jobs:
          - name: oxfmt
            glob: '**/*'
            run: oxfmt --check .
          - name: typos
            glob: '**/*'
            run: typos --config ./typos.toml
          - name: gitleaks
            glob: '**/*'
            run: gitleaks detect --config .gitleaks.toml
          - name: oxlint
            glob: '**/*.{ts,tsx,js,jsx,mjs,cjs}'
            run: oxlint .
          - name: clippy
            glob: 'rust/**/*.rs'
            run: cargo clippy --manifest-path rust/Cargo.toml --workspace --all-targets -- -D warnings

    - name: vitest related
      glob: '*.{ts,tsx,js,jsx,mjs,cjs}'
      run: pnpm vitest related --run {push_files}

    - name: cargo test
      glob:
        - 'rust/**/*.rs'
        - 'rust/**/Cargo.toml'
        - 'rust/Cargo.lock'
      run: cargo test --manifest-path rust/Cargo.toml --workspace
