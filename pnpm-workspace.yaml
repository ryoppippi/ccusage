packages:
  - apps/*
  - docs
  - packages/*

catalogMode: strict

catalogs:
  build:
    '@oxc-project/runtime': ^0.129.0
    tsdown: ^0.22.0
    unplugin-macros: ^0.19.2
    unplugin-unused: ^0.5.7
  docs:
    '@ryoppippi/vite-plugin-cloudflare-redirect': ^1.1.3
    vitepress: 2.0.0-alpha.17
    vitepress-plugin-group-icons: ^1.7.2
    vitepress-plugin-llms: ^1.12.2
    wrangler: 4.91.0
  lint:
    publint: ^0.3.12
  llm-docs:
    '@gunshi/docs': ^0.31.0
  release:
    bumpp: ^11.1.0
    changelogithub: ^14.0.0
    clean-pkg-json: ^1.3.0
    pkg-pr-new: ^0.0.75
  runtime:
    '@antfu/utils': ^9.2.1
    '@praha/byethrow': ^0.11.2
    ansi-escapes: ^7.0.0
    arkregex: ^0.0.5
    get-stdin: ^9.0.0
    gunshi: ^0.31.0
    picospinner: ^3.0.0
    type-fest: ^4.41.0
    valibot: ^1.1.0
    xdg-basedir: ^5.1.0
  testing:
    fs-fixture: ^2.8.1
    mitata: ^1.0.34
    vitest: ^4.1.2
  types:
    '@types/bun': ^1.3.5
    '@types/node': ^24.13.0
    '@types/react': ^19.1.13

enablePrePostScripts: true

minimumReleaseAge: 2880
minimumReleaseAgeExclude:
  - '@ryoppippi/vite-plugin-cloudflare-redirect'
  - vitepress
  - vitepress-plugin-group-icons
  - vitepress-plugin-llms

# Security settings for supply chain attack prevention
strictDepBuilds: true
blockExoticSubdeps: true

trustPolicy: no-downgrade

overrides:
  'changelogithub>c12': 3.3.4

# Explicitly allow build scripts for packages that require them
# (replaces onlyBuiltDependencies)
allowBuilds:
  esbuild: true
  sharp: true
  sqlite3: true
  workerd: true

shellEmulator: true
