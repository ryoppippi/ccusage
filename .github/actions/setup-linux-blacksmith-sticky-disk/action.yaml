name: Setup Linux Blacksmith sticky disk
description: Mount Blacksmith sticky disks for Linux Nix and root node_modules caches
runs:
  using: composite
  steps:
    - name: Detect Blacksmith sticky disk support
      id: blacksmith
      shell: bash
      run: |
        if [ -n "${BLACKSMITH_STICKYDISK_TOKEN:-}" ]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
        else
          echo "enabled=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Resolve pnpm version
      id: pnpm
      if: steps.blacksmith.outputs.enabled == 'true'
      shell: bash
      run: echo "version=$(jq -r '.packageManager | ltrimstr("pnpm@")' package.json)" >> "$GITHUB_OUTPUT"

    - name: Prepare Nix store mount point
      if: steps.blacksmith.outputs.enabled == 'true'
      shell: bash
      run: |
        sudo mkdir -p /nix/store
        sudo chmod 755 /nix

    - name: Mount Nix store sticky disk
      if: steps.blacksmith.outputs.enabled == 'true'
      uses: useblacksmith/stickydisk@d58829ad6f9be8822ec5efe74256c82cd62915ab # v1
      with:
        key: ${{ github.repository }}-nix-${{ runner.os }}-${{ runner.arch }}
        path: /nix

    - name: Prepare mounted Nix store ownership
      if: steps.blacksmith.outputs.enabled == 'true'
      shell: bash
      run: |
        sudo mkdir -p /nix/store
        sudo chown "$USER:$(id -gn)" /nix /nix/store
        for path in /nix/var/log/nix /nix/var/nix; do
          if [ -e "$path" ]; then
            sudo chown -R "$USER:$(id -gn)" "$path"
          fi
        done

    - name: Mount root node_modules sticky disk
      if: steps.blacksmith.outputs.enabled == 'true'
      uses: useblacksmith/stickydisk@d58829ad6f9be8822ec5efe74256c82cd62915ab # v1
      with:
        key: ${{ github.repository }}-node-modules-pnpm-${{ steps.pnpm.outputs.version }}-${{ runner.os }}-${{ runner.arch }}
        path: ./node_modules
