name: Build Linux native package
description: Build, stage, archive, and upload a Linux ccusage native package
inputs:
  arch:
    description: Native package architecture
    required: true
  binary:
    description: Path to the built ccusage binary
    required: true
  nix-github-token:
    description: Whether Nix builds may use the GitHub token from Nix config
    default: 'true'
runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-nix

    - name: DEBUG did the pin survive on the build-native disk
      shell: bash
      run: |
        echo "::group::profiles on restored disk"
        ls -la /nix/var/nix/profiles/ 2>&1 || true
        echo "ccusage-deps profile -> $(readlink -f /nix/var/nix/profiles/ccusage-deps 2>&1 || echo NONE)"
        echo "::endgroup::"
        echo "::group::musl deps presence"
        OUT="$(NIX_CONFIG='access-tokens =' nix eval --raw '.#ccusage-static.cargoArtifacts.outPath' 2>/dev/null || true)"
        echo "musl deps outPath: $OUT"
        if [ -n "$OUT" ]; then
          if nix-store --query --valid-paths "$OUT" >/dev/null 2>&1; then
            echo "RESULT: musl deps PRESENT on restored disk (pin worked)"
          else
            echo "RESULT: musl deps MISSING on restored disk (pin did NOT survive)"
          fi
        fi
        echo "::endgroup::"
        echo "::group::surviving gc roots"
        nix-store --gc --print-roots 2>/dev/null | grep -Ev '/proc/|/run/' | head -40 || true
        echo "::endgroup::"

    - name: Build Linux static binary
      shell: bash
      env:
        NIX_GITHUB_TOKEN: ${{ inputs.nix-github-token }}
      run: |
        if [ "$NIX_GITHUB_TOKEN" = "false" ]; then
          NIX_CONFIG="access-tokens =" nix build .#ccusage-static --print-build-logs
        else
          nix build .#ccusage-static --print-build-logs
        fi

    # Mirror the PR-token hardening from the build step above: on
    # `pull_request` runs (nix-github-token == 'false') the pin's `nix build`
    # and `nix eval` calls must also disable access tokens.
    - uses: ./.github/actions/pin-nix-deps
      env:
        NIX_CONFIG: ${{ inputs.nix-github-token == 'false' && 'access-tokens =' || '' }}
      with:
        attr: .#ccusage-static.cargoArtifacts

    - name: Verify Linux binary is static
      shell: bash
      env:
        BINARY: ${{ inputs.binary }}
      run: |
        file "$BINARY"
        if ldd "$BINARY" > "$RUNNER_TEMP/ldd.txt" 2>&1; then
          cat "$RUNNER_TEMP/ldd.txt"
          grep -Eiq 'not a dynamic executable|statically linked' "$RUNNER_TEMP/ldd.txt"
        else
          cat "$RUNNER_TEMP/ldd.txt"
          grep -Eiq 'not a dynamic executable|statically linked' "$RUNNER_TEMP/ldd.txt"
        fi

    - name: Stage native package
      shell: bash
      env:
        ARCH: ${{ inputs.arch }}
        BINARY: ${{ inputs.binary }}
      run: node apps/ccusage/scripts/stage-native-package.mjs --platform linux --arch "$ARCH" --binary "$BINARY"

    - name: Archive native package binary
      shell: bash
      env:
        ARCH: ${{ inputs.arch }}
      run: tar -cf "ccusage-native-linux-$ARCH.tar" "packages/ccusage-linux-$ARCH/bin"

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ccusage-native-linux-${{ inputs.arch }}
        path: ccusage-native-linux-${{ inputs.arch }}.tar
        if-no-files-found: error
