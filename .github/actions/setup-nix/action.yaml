name: Setup Nix
description: Install Nix with platform-specific cache setup
runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-linux-blacksmith-sticky-disk
      if: runner.os == 'Linux'

    - name: Install Nix
      uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035 # v34
      with:
        github_access_token: ${{ github.token }}
        nix_conf: |
          access-tokens = github.com=${{ github.token }}

    - uses: ./.github/actions/setup-macos-nix-cache
      if: runner.os == 'macOS'

    - name: Fix single-user Nix store ownership
      if: runner.os != 'Windows'
      shell: bash
      run: |
        for path in /nix/var/log/nix /nix/var/nix; do
          if [ -e "$path" ]; then
            sudo chown -R "$USER:$(id -gn)" "$path"
          fi
        done
