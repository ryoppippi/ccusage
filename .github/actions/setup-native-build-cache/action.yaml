name: Setup native build cache
description: Restore native package build caches for the current platform
inputs:
  platform:
    description: Native package platform
    required: true
runs:
  using: composite
  steps:
    - name: Cache Cargo build
      if: inputs.platform == 'win32'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          rust/target
        # The commit sha makes every commit write a fresh entry (actions/cache
        # skips saving on an exact key hit); restore-keys warms from the newest
        # prior entry.
        key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust/Cargo.lock', 'rust-toolchain.toml') }}-${{ github.sha }}
        restore-keys: |
          cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust/Cargo.lock', 'rust-toolchain.toml') }}-
          cargo-${{ runner.os }}-${{ runner.arch }}-
