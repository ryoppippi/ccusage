name: Build macOS Nix native package
description: Build, stage, archive, and upload a macOS ccusage native package with Nix
inputs:
  arch:
    description: Native package architecture
    required: true
  binary:
    description: Path to the built ccusage binary
    required: true
  cache-scope:
    description: >
      Unique matrix-entry identifier (the matrix `name`) used to scope the
      macOS Nix cache. arm64 and x64 share the same arm64 runner, so without a
      per-leg scope the two builds clobber one cache.
    required: true
runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-nix-cache
      with:
        cache-scope: ${{ inputs.cache-scope }}

    - name: Build macOS binary
      shell: bash
      env:
        ARCH: ${{ inputs.arch }}
      run: |
        # arm64 builds natively; x64 cross-compiles on this same arm64 runner
        # (the Apple SDK is multi-arch), so no separate Intel runner is needed.
        case "$ARCH" in
          x64)
            nix build .#ccusage-darwin-x64 --print-build-logs
            ;;
          arm64)
            nix build .#ccusage --print-build-logs
            ;;
          *)
            echo "Unsupported arch: $ARCH" >&2
            exit 1
            ;;
        esac

    - name: Stage native package
      shell: bash
      env:
        ARCH: ${{ inputs.arch }}
        BINARY: ${{ inputs.binary }}
      run: node apps/ccusage/scripts/stage-native-package.mjs --platform darwin --arch "$ARCH" --binary "$BINARY"

    - name: Archive native package binary
      shell: bash
      env:
        ARCH: ${{ inputs.arch }}
      run: tar -cf "ccusage-native-darwin-$ARCH.tar" "packages/ccusage-darwin-$ARCH/bin"

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ccusage-native-darwin-${{ inputs.arch }}
        path: ccusage-native-darwin-${{ inputs.arch }}.tar
        if-no-files-found: error
