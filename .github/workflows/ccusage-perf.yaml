name: ccusage perf comment

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  changes:
    name: Detect code changes
    runs-on: ubuntu-slim
    outputs:
      code-changed: ${{ steps.detect.outputs.code-changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: detect
        uses: ./.github/actions/detect-code-changes

  compare:
    needs: changes
    if: needs.changes.outputs.code-changed == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Build PR ccusage
        run: nix develop --command pnpm --filter ccusage run build

      - name: Stage PR native package
        run: nix develop --command pnpm --filter ccusage run stage:native-package

      - name: Generate large ccusage fixture
        run: |
          nix develop --command pnpm exec bun apps/ccusage/scripts/generate-large-fixture.ts \
            --output-dir "$RUNNER_TEMP/ccusage-large-fixture" \
            --codex-output-dir "$RUNNER_TEMP/ccusage-large-codex-fixture" \
            --size-mib 1024

      - name: Compare fixture performance
        run: |
          nix develop --command pnpm exec bun apps/ccusage/scripts/compare-pr-performance.ts \
            --base-package-url "https://pkg.pr.new/${{ github.repository }}/ccusage@${{ github.event.pull_request.base.sha }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-dir . \
            --head-package-url "https://pkg.pr.new/${{ github.repository }}/ccusage@${{ github.event.pull_request.head.sha }}" \
            --fixture-dir apps/ccusage/test/fixtures/claude \
            --codex-fixture-dir apps/ccusage/test/fixtures/codex \
            --warmup 2 \
            --runs 7 \
            --large-fixture-dir "$RUNNER_TEMP/ccusage-large-fixture" \
            --large-codex-fixture-dir "$RUNNER_TEMP/ccusage-large-codex-fixture" \
            --large-warmup 0 \
            --large-runs 1 \
            --package-runner-timeout-ms 1800000 \
            --output "$RUNNER_TEMP/ccusage-perf-comment.md"

      - name: Write job summary
        run: cat "$RUNNER_TEMP/ccusage-perf-comment.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        if: ${{ !github.event.pull_request.head.repo.fork }}
        env:
          COMMENT_FILE: ${{ runner.temp }}/ccusage-perf-comment.md
          COMMENT_MARKER: <!-- ccusage-perf-comment:${{ github.event.pull_request.head.sha }} -->
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: nix develop --command pnpm exec bun .github/scripts/upsert-pr-comment.ts
