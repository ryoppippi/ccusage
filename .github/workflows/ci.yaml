name: CI

on:
  push:
  pull_request:

jobs:
  lint-check:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
      - run: nix develop --command pnpm lint
      - run: nix develop --command pnpm typecheck

  test:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
      - name: Create default Claude directories for tests
        run: |
          mkdir -p "$HOME/.claude/projects"
          mkdir -p "$HOME/.config/claude/projects"
      - run: nix develop --command pnpm run test

  build-native-packages:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: ubuntu-24.04
            platform: linux
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-15-intel
            platform: darwin
            arch: x64
          - os: windows-11-arm
            platform: win32
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: cargo build --release --bin ccusage
      - run: node apps/ccusage/scripts/stage-native-package.mjs --platform "${{ matrix.platform }}" --arch "${{ matrix.arch }}"
      - name: Archive native package binary
        shell: bash
        run: tar -cf "ccusage-native-${{ matrix.platform }}-${{ matrix.arch }}.tar" "packages/ccusage-${{ matrix.platform }}-${{ matrix.arch }}/bin"
      - uses: actions/upload-artifact@v4
        with:
          name: ccusage-native-${{ matrix.platform }}-${{ matrix.arch }}
          path: ccusage-native-${{ matrix.platform }}-${{ matrix.arch }}.tar
          if-no-files-found: error

  npm-publish-dry-run-and-upload-pkg-pr-now:
    needs:
      - build-native-packages
    runs-on: ubuntu-24.04-arm
    outputs:
      urls: ${{ steps.publish.outputs.urls }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
      - uses: actions/download-artifact@v4
        with:
          pattern: ccusage-native-*
          path: ${{ runner.temp }}/native-packages
          merge-multiple: true
      - name: Restore native package binaries
        run: |
          for archive in "$RUNNER_TEMP"/native-packages/*.tar; do
            tar -xf "$archive"
          done
      - id: publish
        run: nix develop --command pnpm pkg-pr-new publish --pnpm --bin './apps/ccusage' './packages/ccusage-*'

  ccusage-preview-e2e:
    if: github.event_name == 'pull_request'
    needs: npm-publish-dry-run-and-upload-pkg-pr-now
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-slim
          - macos-latest
          - windows-11-arm
          - windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - name: Prepare preview package E2E
        env:
          PKG_PR_NEW_URLS: ${{ needs.npm-publish-dry-run-and-upload-pkg-pr-now.outputs.urls }}
        run: node .github/scripts/e2e-setup.mjs
      - name: Run preview package E2E with Node
        env:
          CCUSAGE_BUN_AUTO_RUN: 0
        shell: pwsh
        run: |
          npx --yes "$env:CCUSAGE_PREVIEW_URL" --version
          npx --yes "$env:CCUSAGE_PREVIEW_URL" daily --offline --json | node -e "JSON.parse(require('fs').readFileSync(0, 'utf8'))"
          npx --yes "$env:CCUSAGE_PREVIEW_URL" daily --offline
      - name: Enable pnpm
        run: corepack enable pnpm
      - name: Run preview package E2E with pnpm dlx
        shell: pwsh
        run: |
          pnpm dlx "$env:CCUSAGE_PREVIEW_URL" --version
          pnpm dlx "$env:CCUSAGE_PREVIEW_URL" daily --offline --json | jq -e .
          pnpm dlx "$env:CCUSAGE_PREVIEW_URL" daily --offline

  spell-check:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
      - run: nix develop --command typos --config ./typos.toml

  schema-check:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-nix
      - name: Generate schema files
        run: nix develop --command pnpm run generate:schema
        working-directory: apps/ccusage
      - name: Check if schema files are up-to-date
        run: |
          if git diff --exit-code apps/ccusage/config-schema.json docs/public/config-schema.json; then
            echo "✅ Schema files are up-to-date"
          else
            echo "❌ Schema files are not up-to-date. Please run 'pnpm run generate:schema' and commit the changes."
            echo ""
            echo "Changed files:"
            git diff --name-only apps/ccusage/config-schema.json docs/public/config-schema.json
            echo ""
            echo "Diff:"
            git diff apps/ccusage/config-schema.json docs/public/config-schema.json
            exit 1
          fi
