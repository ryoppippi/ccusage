name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

jobs:
  changes:
    name: Detect code changes
    runs-on: ubuntu-slim
    outputs:
      code-changed: ${{ steps.detect.outputs.code-changed }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: detect
        uses: ./.github/actions/detect-code-changes

  check:
    needs: changes
    if: needs.changes.outputs.code-changed == 'true'
    runs-on: blacksmith-32vcpu-ubuntu-2404-arm

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-nix
      - run: nix flake check --print-build-logs
      - uses: ./.github/actions/pin-nix-deps
        with:
          attr: .#ccusage.cargoArtifacts
      - run: nix develop --command just typecheck

  test:
    needs: changes
    if: needs.changes.outputs.code-changed == 'true'
    runs-on: blacksmith-32vcpu-ubuntu-2404-arm
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
      # Vitest needs the JS toolchain; the Rust tests run via `nix build`. Install
      # just pnpm/node/just instead of realizing the full dev shell, which drags
      # in every linter, formatter, and the pre-commit hook closure and dominated
      # this job's wall time.
      - name: Install JS tooling
        run: nix profile install --inputs-from . nixpkgs#pnpm nixpkgs#nodejs nixpkgs#just
      - run: pnpm install --frozen-lockfile
      - name: Create default Claude directories for tests
        run: |
          mkdir -p "$HOME/.claude/projects"
          mkdir -p "$HOME/.config/claude/projects"
      - name: Run Vitest tests
        run: just test-vitest
      - name: Run Rust tests
        run: nix build .#ccusage-tests --print-build-logs
      - uses: ./.github/actions/pin-nix-deps
        with:
          attr: .#ccusage.cargoArtifacts

  build-native-packages:
    needs: changes
    if: needs.changes.outputs.code-changed == 'true'
    name: ${{ matrix.name }}
    permissions:
      actions: write
      contents: read
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: build-linux-arm64
            os: blacksmith-32vcpu-ubuntu-2404-arm
            platform: linux
            arch: arm64
            binary: result/bin/ccusage
          - name: build-linux-x64
            os: blacksmith-32vcpu-ubuntu-2404
            platform: linux
            arch: x64
            binary: result/bin/ccusage
          - name: build-mac-arm64
            os: blacksmith-12vcpu-macos-26
            platform: darwin
            arch: arm64
            binary: result/bin/ccusage
          - name: build-windows-x64
            os: blacksmith-32vcpu-windows-2025
            platform: win32
            arch: x64
            binary: rust/target/release/ccusage.exe

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/build-linux-native-package
        if: matrix.platform == 'linux'
        with:
          arch: ${{ matrix.arch }}
          binary: ${{ matrix.binary }}
          nix-github-token: ${{ github.event_name != 'pull_request' }}
      - uses: ./.github/actions/build-macos-nix-native-package
        if: matrix.platform == 'darwin'
        with:
          arch: ${{ matrix.arch }}
          binary: ${{ matrix.binary }}
      - uses: ./.github/actions/build-windows-native-package
        if: matrix.platform == 'win32'
        with:
          arch: ${{ matrix.arch }}
          binary: ${{ matrix.binary }}

  npm-publish-dry-run-and-upload-pkg-pr-now:
    needs:
      - changes
      - build-native-packages
    if: needs.changes.outputs.code-changed == 'true'
    permissions:
      actions: read
      contents: read
    runs-on: blacksmith-32vcpu-ubuntu-2404-arm
    outputs:
      urls: ${{ steps.publish.outputs.urls }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-nix
      # Packing only repackages the native binaries restored from the build
      # matrix below (no Rust build happens here), so the full `nix develop` dev
      # shell is unnecessary. The prepack scripts run tsdown (node) and
      # ensure-native-binary (bun), so provision those runtimes explicitly.
      - run: nix profile install --inputs-from . nixpkgs#pnpm nixpkgs#nodejs nixpkgs#bun
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ccusage-native-*
          path: ${{ runner.temp }}/native-packages
          merge-multiple: true
      - name: Restore native package binaries
        run: |
          for archive in "$RUNNER_TEMP"/native-packages/*.tar; do
            tar -xf "$archive"
          done
      - id: publish
        run: pnpm pkg-pr-new publish --pnpm --bin './apps/ccusage' './packages/ccusage-linux-arm64' './packages/ccusage-linux-x64' './packages/ccusage-darwin-arm64' './packages/ccusage-win32-x64'

  ccusage-preview-e2e:
    if: github.event_name == 'pull_request' && needs.changes.outputs.code-changed == 'true'
    needs:
      - changes
      - npm-publish-dry-run-and-upload-pkg-pr-now
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - blacksmith-32vcpu-ubuntu-2404
          - blacksmith-32vcpu-ubuntu-2404-arm
          - blacksmith-12vcpu-macos-26
          - blacksmith-32vcpu-windows-2025

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - name: Prepare preview package E2E
        env:
          PKG_PR_NEW_URLS: ${{ needs.npm-publish-dry-run-and-upload-pkg-pr-now.outputs.urls }}
        run: node .github/scripts/e2e-setup.mjs
      - name: Run preview package E2E with Node
        shell: pwsh
        run: |
          npx --yes "$env:CCUSAGE_PREVIEW_URL" --version
          npx --yes "$env:CCUSAGE_PREVIEW_URL" daily --offline --json | node -e "JSON.parse(require('fs').readFileSync(0, 'utf8'))"
          npx --yes "$env:CCUSAGE_PREVIEW_URL" daily --offline
      - name: Enable pnpm
        if: runner.os != 'Windows'
        run: corepack enable pnpm
      - name: Run preview package E2E with pnpm dlx
        if: runner.os != 'Windows'
        shell: pwsh
        run: |
          pnpm --config.block-exotic-subdeps=false --config.minimum-release-age=0 dlx "$env:CCUSAGE_PNPM_DLX_URL" --version
          pnpm --config.block-exotic-subdeps=false --config.minimum-release-age=0 dlx "$env:CCUSAGE_PNPM_DLX_URL" daily --offline --json | node -e "JSON.parse(require('fs').readFileSync(0, 'utf8'))"
          pnpm --config.block-exotic-subdeps=false --config.minimum-release-age=0 dlx "$env:CCUSAGE_PNPM_DLX_URL" daily --offline

  ccusage-perf-comment:
    name: ccusage perf comment
    if: github.event_name == 'pull_request' && needs.changes.outputs.code-changed == 'true'
    needs:
      - changes
      - npm-publish-dry-run-and-upload-pkg-pr-now
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: blacksmith-32vcpu-ubuntu-2404-arm
    timeout-minutes: 30

    steps:
      - name: Checkout PR
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
      # This job only benchmarks the prebuilt ccusage binary bundled in the
      # installed pkg.pr.new package (no Rust build happens here), so the full
      # `nix develop` dev shell is unnecessary. Install just the tools the perf
      # scripts invoke, pinned to the flake's nixpkgs via `--inputs-from .`.
      - name: Install perf tooling
        run: nix profile install --inputs-from . nixpkgs#pnpm nixpkgs#nodejs nixpkgs#bun nixpkgs#hyperfine nixpkgs#just
      - run: pnpm install --frozen-lockfile

      - name: Resolve PR preview package URL
        env:
          PKG_PR_NEW_URLS: ${{ needs.npm-publish-dry-run-and-upload-pkg-pr-now.outputs.urls }}
        run: |
          preview_url="$(
            # shellcheck disable=SC2016
            node -e 'const urls = (process.env.PKG_PR_NEW_URLS ?? "").split(/\s+/).filter(Boolean); const url = urls.find((candidate) => /(?:^|\/)ccusage@/.test(candidate)); if (url == null) { throw new Error(`ccusage preview URL not found in: ${urls.join(", ")}`); } console.log(url);'
          )"
          echo "CCUSAGE_PREVIEW_URL=$preview_url" >> "$GITHUB_ENV"

      - name: Generate large ccusage fixture
        run: |
          just generate-large-fixture \
            "$RUNNER_TEMP/ccusage-large-fixture" \
            "$RUNNER_TEMP/ccusage-large-codex-fixture" \
            1024

      - name: Compare fixture performance
        run: |
          pnpm exec bun apps/ccusage/scripts/compare-pr-performance.ts \
            --base-package-url "https://pkg.pr.new/${{ github.repository }}/ccusage@${{ github.event.pull_request.base.sha }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-dir . \
            --head-package-url "$CCUSAGE_PREVIEW_URL" \
            --fixture-dir apps/ccusage/test/fixtures/claude \
            --codex-fixture-dir apps/ccusage/test/fixtures/codex \
            --warmup 2 \
            --runs 7 \
            --large-fixture-dir "$RUNNER_TEMP/ccusage-large-fixture" \
            --large-codex-fixture-dir "$RUNNER_TEMP/ccusage-large-codex-fixture" \
            --large-warmup 0 \
            --large-runs 1 \
            --package-runner-timeout-ms 300000 \
            --output "$RUNNER_TEMP/ccusage-perf-comment.md"

      - name: Write job summary
        run: cat "$RUNNER_TEMP/ccusage-perf-comment.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        if: ${{ !github.event.pull_request.head.repo.fork }}
        env:
          COMMENT_FILE: ${{ runner.temp }}/ccusage-perf-comment.md
          COMMENT_MARKER: <!-- ccusage-perf-comment:${{ github.event.pull_request.head.sha }} -->
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: pnpm exec bun .github/scripts/upsert-pr-comment.ts

  ccusage-rust-perf-comment:
    name: ccusage rust perf comment
    if: github.event_name == 'pull_request' && needs.changes.outputs.code-changed == 'true'
    needs:
      - changes
      - npm-publish-dry-run-and-upload-pkg-pr-now
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: blacksmith-32vcpu-ubuntu-2404-arm
    timeout-minutes: 30

    steps:
      - name: Checkout PR
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
      # This job only benchmarks the prebuilt ccusage binary bundled in the
      # installed pkg.pr.new package (no Rust build happens here), so the full
      # `nix develop` dev shell is unnecessary. Install just the tools the perf
      # scripts invoke, pinned to the flake's nixpkgs via `--inputs-from .`.
      - name: Install perf tooling
        run: nix profile install --inputs-from . nixpkgs#pnpm nixpkgs#nodejs nixpkgs#bun nixpkgs#hyperfine nixpkgs#just
      - run: pnpm install --frozen-lockfile

      - name: Resolve PR preview package URL
        env:
          PKG_PR_NEW_URLS: ${{ needs.npm-publish-dry-run-and-upload-pkg-pr-now.outputs.urls }}
        run: |
          preview_url="$(
            # shellcheck disable=SC2016
            node -e 'const urls = (process.env.PKG_PR_NEW_URLS ?? "").split(/\s+/).filter(Boolean); const url = urls.find((candidate) => /(?:^|\/)ccusage@/.test(candidate)); if (url == null) { throw new Error(`ccusage preview URL not found in: ${urls.join(", ")}`); } console.log(url);'
          )"
          echo "CCUSAGE_PREVIEW_URL=$preview_url" >> "$GITHUB_ENV"

      - name: Generate large ccusage fixture
        run: |
          just generate-large-fixture \
            "$RUNNER_TEMP/ccusage-large-fixture" \
            "$RUNNER_TEMP/ccusage-large-codex-fixture" \
            1024

      - name: Compare Rust performance
        run: |
          pnpm exec bun apps/ccusage/scripts/compare-pr-performance.ts \
            --base-package-url "https://pkg.pr.new/${{ github.repository }}/ccusage@${{ github.event.pull_request.base.sha }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-dir . \
            --head-package-url "$CCUSAGE_PREVIEW_URL" \
            --head-runtime rust \
            --fixture-dir apps/ccusage/test/fixtures/claude \
            --codex-fixture-dir apps/ccusage/test/fixtures/codex \
            --warmup 2 \
            --runs 7 \
            --large-fixture-dir "$RUNNER_TEMP/ccusage-large-fixture" \
            --large-codex-fixture-dir "$RUNNER_TEMP/ccusage-large-codex-fixture" \
            --large-warmup 0 \
            --large-runs 1 \
            --package-runner-timeout-ms 300000 \
            --output "$RUNNER_TEMP/ccusage-rust-perf-comment.md"

      - name: Write job summary
        run: cat "$RUNNER_TEMP/ccusage-rust-perf-comment.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        if: ${{ !github.event.pull_request.head.repo.fork }}
        env:
          COMMENT_FILE: ${{ runner.temp }}/ccusage-rust-perf-comment.md
          COMMENT_MARKER: <!-- ccusage-rust-perf-comment:${{ github.event.pull_request.head.sha }} -->
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: pnpm exec bun .github/scripts/upsert-pr-comment.ts

  action-timeline:
    needs:
      - changes
      - check
      - test
      - build-native-packages
      - npm-publish-dry-run-and-upload-pkg-pr-now
      - ccusage-preview-e2e
      - ccusage-perf-comment
      - ccusage-rust-perf-comment
    if: ${{ always() }}
    runs-on: ubuntu-slim
    steps:
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
