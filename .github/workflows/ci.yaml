name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

jobs:
  changes:
    name: Detect code changes
    runs-on: ubuntu-slim
    outputs:
      code-changed: ${{ steps.detect.outputs.code-changed }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: detect
        uses: ./.github/actions/detect-code-changes

  check:
    needs: changes
    if: needs.changes.outputs.code-changed == 'true'
    runs-on: blacksmith-32vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-nix-cache
      - run: nix flake check --print-build-logs
      - run: nix develop --command just typecheck

  test:
    needs: changes
    if: needs.changes.outputs.code-changed == 'true'
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: ./.github/actions/setup-nix-cache
      # Vitest needs the JS toolchain; the Rust tests run via `nix build`. Install
      # just pnpm/node/just instead of realizing the full dev shell, which drags
      # in every linter, formatter, and the pre-commit hook closure and dominated
      # this job's wall time.
      - name: Install JS tooling
        run: nix profile install --inputs-from . nixpkgs#pnpm nixpkgs#nodejs nixpkgs#just
      - run: pnpm install --frozen-lockfile
      - name: Create default Claude directories for tests
        run: |
          mkdir -p "$HOME/.claude/projects"
          mkdir -p "$HOME/.config/claude/projects"
      - name: Run Vitest tests
        run: just test-vitest
      - name: Run Rust tests
        run: nix build .#ccusage-tests --print-build-logs

  build-native-packages:
    needs: changes
    if: needs.changes.outputs.code-changed == 'true'
    name: ${{ matrix.name }}
    permissions:
      actions: write
      contents: read
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: build-linux-arm64
            os: blacksmith-32vcpu-ubuntu-2404-arm
            platform: linux
            arch: arm64
            binary: result/bin/ccusage
          - name: build-linux-x64
            os: blacksmith-32vcpu-ubuntu-2404
            platform: linux
            arch: x64
            binary: result/bin/ccusage
          - name: build-mac-arm64
            os: blacksmith-12vcpu-macos-26
            platform: darwin
            arch: arm64
            binary: result/bin/ccusage
          - name: build-mac-x64
            os: blacksmith-12vcpu-macos-26
            platform: darwin
            arch: x64
            binary: result/bin/ccusage
          - name: build-windows-x64
            os: blacksmith-32vcpu-windows-2025
            platform: win32
            arch: x64
            binary: rust/target/release/ccusage.exe

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/build-linux-native-package
        if: matrix.platform == 'linux'
        with:
          arch: ${{ matrix.arch }}
          binary: ${{ matrix.binary }}
          nix-github-token: ${{ github.event_name != 'pull_request' }}
          cache-scope: ${{ matrix.name }}
      - uses: ./.github/actions/build-macos-nix-native-package
        if: matrix.platform == 'darwin'
        with:
          arch: ${{ matrix.arch }}
          binary: ${{ matrix.binary }}
          cache-scope: ${{ matrix.name }}
      - uses: ./.github/actions/build-windows-native-package
        if: matrix.platform == 'win32'
        with:
          arch: ${{ matrix.arch }}
          binary: ${{ matrix.binary }}

  npm-publish-dry-run-and-upload-pkg-pr-now:
    needs:
      - changes
      - build-native-packages
    if: needs.changes.outputs.code-changed == 'true'
    permissions:
      actions: read
      contents: read
    runs-on: blacksmith-32vcpu-ubuntu-2404
    outputs:
      urls: ${{ steps.publish.outputs.urls }}
      preview-url: ${{ steps.preview-url.outputs.url }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-nix-cache
      # Packing only repackages the native binaries restored from the build
      # matrix below (no Rust build happens here), so the full `nix develop` dev
      # shell is unnecessary. The prepack scripts run tsdown with node; the
      # ensure-native-binary script brings Nushell through its Nix shebang.
      - run: nix profile install --inputs-from . nixpkgs#pnpm nixpkgs#nodejs
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ccusage-native-*
          path: ${{ runner.temp }}/native-packages
          merge-multiple: true
      - name: Restore native package binaries
        run: |
          for archive in "$RUNNER_TEMP"/native-packages/*.tar; do
            tar -xf "$archive"
          done
      - id: publish
        run: pnpm pkg-pr-new publish --pnpm --bin './apps/ccusage' './packages/ccusage-linux-arm64' './packages/ccusage-linux-x64' './packages/ccusage-darwin-arm64' './packages/ccusage-darwin-x64' './packages/ccusage-win32-x64'
      # Resolve the ccusage CLI preview URL and build the E2E fixture here (this
      # job has the checkout); the E2E jobs then run without a checkout.
      - id: preview-url
        env:
          URLS: ${{ steps.publish.outputs.urls }}
        run: |
          node -e 'const urls=(process.env.URLS??"").split(/\s+/).filter(Boolean);const u=urls.find((x)=>/(?:^|\/)ccusage@/.test(x));if(u==null){throw new Error(`ccusage preview URL not found in: ${urls.join(", ")}`)}require("node:fs").appendFileSync(process.env.GITHUB_OUTPUT,`url=${u}\n`)'
      - name: Generate E2E fixture
        run: node .github/scripts/generate-e2e-fixture.mjs "$RUNNER_TEMP/e2e-fixture"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ccusage-e2e-fixture
          path: ${{ runner.temp }}/e2e-fixture
          if-no-files-found: error

  ccusage-preview-e2e:
    # Run on PRs and on pushes to the default branch. `push` only fires on main
    # (see on.push.branches), so this validates the published preview package
    # post-merge too, not just on PRs.
    if: needs.changes.outputs.code-changed == 'true'
    name: e2e ${{ matrix.runner }} (${{ matrix.os }})
    needs:
      - changes
      - npm-publish-dry-run-and-upload-pkg-pr-now
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    # No checkout on purpose: the working directory stays empty so each package
    # runner behaves like a real end user instead of inheriting the repo's
    # pnpm-workspace.yaml / package.json (which is why pnpm previously needed
    # --config overrides). The preview URL and the fixture come from the publish
    # job via a job output and an artifact.
    env:
      CCUSAGE_PREVIEW_URL: ${{ needs.npm-publish-dry-run-and-upload-pkg-pr-now.outputs.preview-url }}
      LOG_LEVEL: '0'
    strategy:
      fail-fast: false
      matrix:
        os:
          - blacksmith-32vcpu-ubuntu-2404
          - blacksmith-32vcpu-ubuntu-2404-arm
          - blacksmith-12vcpu-macos-26
          # Intel macOS to exercise the cross-built x86_64 darwin binary on real
          # Intel hardware (the build runner is arm64).
          - macos-15-intel
          - blacksmith-32vcpu-windows-2025
        # One job per package runner, each installed via its official action.
        # Excluded:
        #   yarn - no official install action (it expects corepack, which we avoid)
        #   deno - the npm: specifier only resolves a registry name@version, not
        #          the tarball URL that pkg.pr.new serves (denoland/deno#28686)
        runner:
          - npm
          - pnpm
          - bun

    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        if: matrix.runner == 'pnpm'
        with:
          version: latest
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        if: matrix.runner == 'bun'
        with:
          bun-version: latest
      - name: Download E2E fixture
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # actions/download-artifact talks to the artifact backend through the
          # Blacksmith-proxied results-receiver endpoint, whose local agent is
          # not yet listening in the first seconds after a macOS VM boots: the
          # download runs ~2s in and intermittently hits ECONNREFUSED on
          # ListArtifacts (re-running the job, once the agent is warm, succeeds).
          # gh run download uses the api.github.com REST API directly, sidestepping
          # that proxy, and we retry with backoff to ride out any transient hiccup.
          # These jobs skip actions/checkout, so create a minimal git context
          # for gh instead of relying on --repo (which some gh versions still
          # follow with a local git probe).
          $gitDir = "$env:RUNNER_TEMP/gh-context"
          New-Item -ItemType Directory -Force -Path $gitDir | Out-Null
          Push-Location $gitDir
          git init -q
          git remote add origin "https://github.com/$env:GITHUB_REPOSITORY.git"
          Pop-Location
          $dir = "$env:RUNNER_TEMP/e2e-fixture"
          for ($i = 1; $i -le 5; $i++) {
            Push-Location $gitDir
            gh run download $env:GITHUB_RUN_ID --name ccusage-e2e-fixture --dir $dir
            Pop-Location
            if ($LASTEXITCODE -eq 0) { break }
            if ($i -eq 5) { throw "failed to download the E2E fixture after 5 attempts" }
            Start-Sleep -Seconds ($i * 5)
          }
          "CLAUDE_CONFIG_DIR=$dir" >> $env:GITHUB_ENV
      - name: Run preview E2E
        shell: pwsh
        env:
          RUNNER_KIND: ${{ matrix.runner }}
          # pnpm 11 defaults minimumReleaseAge to 1440 (24h), which would reject
          # a pkg.pr.new preview published moments ago. Opt out via the config
          # env var (only pnpm reads PNPM_CONFIG_*, so npm/bun ignore it).
          # https://pnpm.io/settings#minimumreleaseage
          PNPM_CONFIG_MINIMUM_RELEASE_AGE: '0'
          # pnpm 11 also defaults blockExoticSubdeps to true, which rejects the
          # URL-resolved native optional deps (e.g. @ccusage/ccusage-linux-x64)
          # that pkg.pr.new injects into the published ccusage manifest. Allow
          # them so `pnpm dlx <url>` can install the matching native binary.
          # https://pnpm.io/settings#blockexoticsubdeps
          PNPM_CONFIG_BLOCK_EXOTIC_SUBDEPS: 'false'
        run: |
          # pnpm dlx on Windows doesn't install optional native binaries into its
          # temporary store, so the CLI launcher fails with spawn ENOENT; skip
          # that one combination.
          if ($env:RUNNER_KIND -eq 'pnpm' -and $IsWindows) {
            Write-Host 'skip: pnpm dlx on Windows cannot install the native binary'
            exit 0
          }
          $url = $env:CCUSAGE_PREVIEW_URL
          function Invoke-Ccusage([string[]]$ccArgs) {
            switch ($env:RUNNER_KIND) {
              'npm' { return (npx --yes $url @ccArgs) }
              'pnpm' { return (pnpm dlx $url @ccArgs) }
              'bun' { return (bunx -p $url ccusage @ccArgs) }
            }
          }
          Invoke-Ccusage @('--version') | Out-Host
          if ($LASTEXITCODE -ne 0) { throw '--version failed' }
          # Exercise every report command, both offline and online (online fetches
          # live pricing), validating the JSON output each time.
          foreach ($cmd in 'daily', 'monthly', 'session') {
            foreach ($mode in @(@('--offline'), @())) {
              $label = "$cmd $($mode -join ' ')".Trim()
              Invoke-Ccusage (@($cmd) + $mode) | Out-Host
              if ($LASTEXITCODE -ne 0) { throw "ccusage $label failed ($LASTEXITCODE)" }
              $json = Invoke-Ccusage (@($cmd) + $mode + @('--json'))
              if ($LASTEXITCODE -ne 0) { throw "ccusage $label --json failed ($LASTEXITCODE)" }
              $json | node -e "JSON.parse(require('fs').readFileSync(0, 'utf8'))"
              if ($LASTEXITCODE -ne 0) { throw "ccusage $label --json produced invalid JSON" }
              Write-Host "ok: $label"
            }
          }

  ccusage-perf-comment:
    name: ccusage ${{ matrix.label }}
    if: github.event_name == 'pull_request' && needs.changes.outputs.code-changed == 'true'
    needs:
      - changes
      - npm-publish-dry-run-and-upload-pkg-pr-now
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Same benchmark from two entry points, posted as two PR comments:
          # the JS launcher (default runtime) and the bundled Rust native binary.
          - runtime: js
            label: perf comment
            slug: perf-comment
            head-runtime-arg: ''
          - runtime: rust
            label: rust perf comment
            slug: rust-perf-comment
            head-runtime-arg: --head-runtime rust

    steps:
      - name: Checkout PR
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix-cache
        with:
          # js and rust legs share this job id, so scope the cache per runtime.
          cache-scope: ${{ matrix.runtime }}
      # This job only benchmarks the prebuilt ccusage binary bundled in the
      # installed pkg.pr.new package (no Rust build happens here), so the full
      # `nix develop` dev shell is unnecessary. Install just the tools the perf
      # scripts invoke, pinned to the flake's nixpkgs via `--inputs-from .`.
      - name: Install perf tooling
        run: nix profile install --inputs-from . nixpkgs#bun nixpkgs#just

      - name: Resolve PR preview package URL
        env:
          PKG_PR_NEW_URLS: ${{ needs.npm-publish-dry-run-and-upload-pkg-pr-now.outputs.urls }}
        run: |
          preview_url="$(
            printf '%s\n' "$PKG_PR_NEW_URLS" \
              | tr '[:space:]' '\n' \
              | grep -E '(^|/)ccusage@' \
              | head -n 1
          )"
          if [ -z "$preview_url" ]; then
            echo "ccusage preview URL not found in: $PKG_PR_NEW_URLS" >&2
            exit 1
          fi
          echo "CCUSAGE_PREVIEW_URL=$preview_url" >> "$GITHUB_ENV"

      - name: Generate large ccusage fixture
        run: |
          just generate-large-fixture \
            "$RUNNER_TEMP/ccusage-large-fixture" \
            "$RUNNER_TEMP/ccusage-large-codex-fixture" \
            1024

      - name: Compare performance
        run: |
          apps/ccusage/scripts/compare-pr-performance.nu \
            --base-package-url "https://pkg.pr.new/${{ github.repository }}/ccusage@${{ github.event.pull_request.base.sha }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-dir . \
            --head-package-url "$CCUSAGE_PREVIEW_URL" \
            ${{ matrix.head-runtime-arg }} \
            --fixture-dir apps/ccusage/test/fixtures/claude \
            --codex-fixture-dir apps/ccusage/test/fixtures/codex \
            --warmup 2 \
            --runs 7 \
            --large-fixture-dir "$RUNNER_TEMP/ccusage-large-fixture" \
            --large-codex-fixture-dir "$RUNNER_TEMP/ccusage-large-codex-fixture" \
            --large-warmup 0 \
            --large-runs 1 \
            --package-runner-timeout-ms 300000 \
            --output "$RUNNER_TEMP/ccusage-${{ matrix.slug }}.md"

      - name: Write job summary
        run: cat "$RUNNER_TEMP/ccusage-${{ matrix.slug }}.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        if: ${{ !github.event.pull_request.head.repo.fork }}
        env:
          COMMENT_FILE: ${{ runner.temp }}/ccusage-${{ matrix.slug }}.md
          COMMENT_MARKER: <!-- ccusage-${{ matrix.slug }}:${{ github.event.pull_request.head.sha }} -->
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: .github/scripts/upsert-pr-comment.nu

  action-timeline:
    needs:
      - changes
      - check
      - test
      - build-native-packages
      - npm-publish-dry-run-and-upload-pkg-pr-now
      - ccusage-preview-e2e
      - ccusage-perf-comment
    if: ${{ always() }}
    runs-on: ubuntu-slim
    steps:
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
