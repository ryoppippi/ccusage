name: CI

on:
  push:
  pull_request:

permissions: read-all

jobs:
  changes:
    name: Detect code changes
    runs-on: ubuntu-slim
    outputs:
      code-changed: ${{ steps.detect.outputs.code-changed }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: detect
        uses: ./.github/actions/detect-code-changes

  lint-check:
    needs: changes
    if: needs.changes.outputs.code-changed == 'true'
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-nix
        with:
          cache-profile: dev
      - run: nix flake check --print-build-logs
      - run: nix flake check ./dev --print-build-logs
      - run: nix develop ./dev#ci --command just install
      - run: nix develop ./dev#ci --command just typecheck

  test:
    needs: changes
    if: needs.changes.outputs.code-changed == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
      code-quality: write
      pull-requests: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cache-profile: dev
      - run: nix develop ./dev#ci --command just install
      - name: Create default Claude directories for tests
        run: |
          mkdir -p "$HOME/.claude/projects"
          mkdir -p "$HOME/.config/claude/projects"
      - name: Run test suite
        if: github.event_name != 'pull_request' && github.ref != format('refs/heads/{0}', github.event.repository.default_branch)
        run: nix develop ./dev#ci --command just test
      - name: Run Vitest tests
        if: github.event_name == 'pull_request' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: nix develop ./dev#ci --command just test-vitest
      - name: Generate Rust coverage report
        if: github.event_name == 'pull_request' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          mkdir -p coverage
          env -u CFLAGS -u CXXFLAGS nix develop ./dev#ci --command cargo llvm-cov \
            --manifest-path rust/Cargo.toml \
            --workspace \
            --cobertura \
            --output-path coverage/cobertura.xml
      - name: Upload Rust coverage report
        if: (github.event_name == 'pull_request' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1.3.0
        with:
          file: coverage/cobertura.xml
          language: Rust
          label: code-coverage/cargo-llvm-cov
          fail-on-error: false

  build-native-packages:
    needs: changes
    if: needs.changes.outputs.code-changed == 'true'
    permissions:
      actions: write
      contents: read
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            binary: result/bin/ccusage
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            binary: result/bin/ccusage
          - os: macos-latest
            platform: darwin
            arch: arm64
            binary: result/bin/ccusage
          - os: macos-15-intel
            platform: darwin
            arch: x64
            binary: rust/target/release/ccusage
          - os: windows-11-arm
            platform: win32
            arch: arm64
            binary: rust/target/release/ccusage.exe
          - os: windows-latest
            platform: win32
            arch: x64
            binary: rust/target/release/ccusage.exe

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-nix
        if: matrix.platform == 'linux' || (matrix.platform == 'darwin' && matrix.arch == 'arm64')
      - name: Cache Cargo build
        if: matrix.platform != 'linux' && !(matrix.platform == 'darwin' && matrix.arch == 'arm64')
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-
      - name: Build Linux static binary
        if: matrix.platform == 'linux'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            NIX_CONFIG="access-tokens =" nix build .#ccusage-static
          else
            nix build .#ccusage-static
          fi
      - name: Build macOS arm64 binary
        if: matrix.platform == 'darwin' && matrix.arch == 'arm64'
        run: nix build .#ccusage
      - name: Verify Linux binary is static
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          file "${{ matrix.binary }}"
          if ldd "${{ matrix.binary }}" > "$RUNNER_TEMP/ldd.txt" 2>&1; then
            cat "$RUNNER_TEMP/ldd.txt"
            grep -Eiq 'not a dynamic executable|statically linked' "$RUNNER_TEMP/ldd.txt"
          else
            cat "$RUNNER_TEMP/ldd.txt"
            grep -Eiq 'not a dynamic executable|statically linked' "$RUNNER_TEMP/ldd.txt"
          fi
      - name: Build Cargo native binary
        if: matrix.platform != 'linux' && !(matrix.platform == 'darwin' && matrix.arch == 'arm64')
        run: cargo build --manifest-path rust/Cargo.toml --release --bin ccusage
      - run: node apps/ccusage/scripts/stage-native-package.mjs --platform "${{ matrix.platform }}" --arch "${{ matrix.arch }}" --binary "${{ matrix.binary }}"
      - name: Archive native package binary
        shell: bash
        run: tar -cf "ccusage-native-${{ matrix.platform }}-${{ matrix.arch }}.tar" "packages/ccusage-${{ matrix.platform }}-${{ matrix.arch }}/bin"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ccusage-native-${{ matrix.platform }}-${{ matrix.arch }}
          path: ccusage-native-${{ matrix.platform }}-${{ matrix.arch }}.tar
          if-no-files-found: error

  npm-publish-dry-run-and-upload-pkg-pr-now:
    needs:
      - changes
      - build-native-packages
    if: needs.changes.outputs.code-changed == 'true'
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-24.04-arm
    outputs:
      urls: ${{ steps.publish.outputs.urls }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-nix
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ccusage-native-*
          path: ${{ runner.temp }}/native-packages
          merge-multiple: true
      - name: Restore native package binaries
        run: |
          for archive in "$RUNNER_TEMP"/native-packages/*.tar; do
            tar -xf "$archive"
          done
      - run: nix develop ./dev#ci --command just install
      - id: publish
        run: nix develop ./dev#ci --command pnpm pkg-pr-new publish --pnpm --bin './apps/ccusage' './packages/ccusage-*'

  ccusage-preview-e2e:
    if: github.event_name == 'pull_request' && needs.changes.outputs.code-changed == 'true'
    needs:
      - changes
      - npm-publish-dry-run-and-upload-pkg-pr-now
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-slim
          - macos-latest
          - windows-11-arm
          - windows-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - name: Prepare preview package E2E
        env:
          PKG_PR_NEW_URLS: ${{ needs.npm-publish-dry-run-and-upload-pkg-pr-now.outputs.urls }}
        run: node .github/scripts/e2e-setup.mjs
      - name: Run preview package E2E with Node
        shell: pwsh
        run: |
          npx --yes "$env:CCUSAGE_PREVIEW_URL" --version
          npx --yes "$env:CCUSAGE_PREVIEW_URL" daily --offline --json | node -e "JSON.parse(require('fs').readFileSync(0, 'utf8'))"
          npx --yes "$env:CCUSAGE_PREVIEW_URL" daily --offline
      - name: Enable pnpm
        if: runner.os != 'Windows'
        run: corepack enable pnpm
      - name: Run preview package E2E with pnpm dlx
        if: runner.os != 'Windows'
        shell: pwsh
        run: |
          pnpm --config.block-exotic-subdeps=false dlx "$env:CCUSAGE_PNPM_DLX_URL" --version
          pnpm --config.block-exotic-subdeps=false dlx "$env:CCUSAGE_PNPM_DLX_URL" daily --offline --json | node -e "JSON.parse(require('fs').readFileSync(0, 'utf8'))"
          pnpm --config.block-exotic-subdeps=false dlx "$env:CCUSAGE_PNPM_DLX_URL" daily --offline

  ccusage-perf-comment:
    name: ccusage perf comment
    if: github.event_name == 'pull_request' && needs.changes.outputs.code-changed == 'true'
    needs:
      - changes
      - npm-publish-dry-run-and-upload-pkg-pr-now
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - name: Checkout PR
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cache-profile: dev

      - name: Resolve PR preview package URL
        env:
          PKG_PR_NEW_URLS: ${{ needs.npm-publish-dry-run-and-upload-pkg-pr-now.outputs.urls }}
        run: |
          preview_url="$(
            node -e 'const urls = (process.env.PKG_PR_NEW_URLS ?? "").split(/\s+/).filter(Boolean); const url = urls.find((candidate) => /(?:^|\/)ccusage@/.test(candidate)); if (url == null) { throw new Error(`ccusage preview URL not found in: ${urls.join(", ")}`); } console.log(url);'
          )"
          echo "CCUSAGE_PREVIEW_URL=$preview_url" >> "$GITHUB_ENV"

      - name: Generate large ccusage fixture
        run: |
          nix develop ./dev#ci --command just install
          nix develop ./dev#ci --command just generate-large-fixture \
            "$RUNNER_TEMP/ccusage-large-fixture" \
            "$RUNNER_TEMP/ccusage-large-codex-fixture" \
            1024

      - name: Compare fixture performance
        run: |
          nix develop ./dev#ci --command pnpm exec bun apps/ccusage/scripts/compare-pr-performance.ts \
            --base-package-url "https://pkg.pr.new/${{ github.repository }}/ccusage@${{ github.event.pull_request.base.sha }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-dir . \
            --head-package-url "$CCUSAGE_PREVIEW_URL" \
            --fixture-dir apps/ccusage/test/fixtures/claude \
            --codex-fixture-dir apps/ccusage/test/fixtures/codex \
            --warmup 2 \
            --runs 7 \
            --large-fixture-dir "$RUNNER_TEMP/ccusage-large-fixture" \
            --large-codex-fixture-dir "$RUNNER_TEMP/ccusage-large-codex-fixture" \
            --large-warmup 0 \
            --large-runs 1 \
            --package-runner-timeout-ms 1800000 \
            --output "$RUNNER_TEMP/ccusage-perf-comment.md"

      - name: Write job summary
        run: cat "$RUNNER_TEMP/ccusage-perf-comment.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        if: ${{ !github.event.pull_request.head.repo.fork }}
        env:
          COMMENT_FILE: ${{ runner.temp }}/ccusage-perf-comment.md
          COMMENT_MARKER: <!-- ccusage-perf-comment:${{ github.event.pull_request.head.sha }} -->
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: nix develop ./dev#ci --command pnpm exec bun .github/scripts/upsert-pr-comment.ts

  ccusage-rust-perf-comment:
    name: ccusage rust perf comment
    if: github.event_name == 'pull_request' && needs.changes.outputs.code-changed == 'true'
    needs:
      - changes
      - npm-publish-dry-run-and-upload-pkg-pr-now
    permissions:
      contents: read
      pull-requests: write
      issues: write
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - name: Checkout PR
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cache-profile: dev

      - name: Resolve PR preview package URL
        env:
          PKG_PR_NEW_URLS: ${{ needs.npm-publish-dry-run-and-upload-pkg-pr-now.outputs.urls }}
        run: |
          preview_url="$(
            node -e 'const urls = (process.env.PKG_PR_NEW_URLS ?? "").split(/\s+/).filter(Boolean); const url = urls.find((candidate) => /(?:^|\/)ccusage@/.test(candidate)); if (url == null) { throw new Error(`ccusage preview URL not found in: ${urls.join(", ")}`); } console.log(url);'
          )"
          echo "CCUSAGE_PREVIEW_URL=$preview_url" >> "$GITHUB_ENV"

      - name: Generate large ccusage fixture
        run: |
          nix develop ./dev#ci --command just install
          nix develop ./dev#ci --command just generate-large-fixture \
            "$RUNNER_TEMP/ccusage-large-fixture" \
            "$RUNNER_TEMP/ccusage-large-codex-fixture" \
            1024

      - name: Compare Rust performance
        run: |
          nix develop ./dev#ci --command pnpm exec bun apps/ccusage/scripts/compare-pr-performance.ts \
            --base-package-url "https://pkg.pr.new/${{ github.repository }}/ccusage@${{ github.event.pull_request.base.sha }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-dir . \
            --head-package-url "$CCUSAGE_PREVIEW_URL" \
            --head-runtime rust \
            --fixture-dir apps/ccusage/test/fixtures/claude \
            --codex-fixture-dir apps/ccusage/test/fixtures/codex \
            --warmup 2 \
            --runs 7 \
            --large-fixture-dir "$RUNNER_TEMP/ccusage-large-fixture" \
            --large-codex-fixture-dir "$RUNNER_TEMP/ccusage-large-codex-fixture" \
            --large-warmup 0 \
            --large-runs 1 \
            --package-runner-timeout-ms 1800000 \
            --output "$RUNNER_TEMP/ccusage-rust-perf-comment.md"

      - name: Write job summary
        run: cat "$RUNNER_TEMP/ccusage-rust-perf-comment.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        if: ${{ !github.event.pull_request.head.repo.fork }}
        env:
          COMMENT_FILE: ${{ runner.temp }}/ccusage-rust-perf-comment.md
          COMMENT_MARKER: <!-- ccusage-rust-perf-comment:${{ github.event.pull_request.head.sha }} -->
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: nix develop ./dev#ci --command pnpm exec bun .github/scripts/upsert-pr-comment.ts

  action-timeline:
    needs:
      - changes
      - lint-check
      - test
      - build-native-packages
      - npm-publish-dry-run-and-upload-pkg-pr-now
      - ccusage-preview-e2e
      - ccusage-perf-comment
      - ccusage-rust-perf-comment
    if: ${{ always() }}
    runs-on: ubuntu-slim
    steps:
      - uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
