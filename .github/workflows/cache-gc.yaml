name: Sticky Disk GC

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions: read-all

jobs:
  nix-store-gc:
    name: Nix store GC (${{ matrix.profile }}, ${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-arm64
            runner: blacksmith-32vcpu-ubuntu-2404-arm
            profile: package
          - name: linux-x64
            runner: blacksmith-32vcpu-ubuntu-2404
            profile: package
          - name: linux-arm64
            runner: blacksmith-32vcpu-ubuntu-2404-arm
            profile: dev
          - name: linux-x64
            runner: blacksmith-32vcpu-ubuntu-2404
            profile: dev

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          cache-profile: ${{ matrix.profile }}
      - name: Delete Nix store paths older than 7 days
        run: nix-collect-garbage --delete-older-than 7d
