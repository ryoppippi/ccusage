name: npm publish

on:
  push:
    tags:
      - '*'

jobs:
  build-native-packages:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: build-linux-arm64
            os: blacksmith-32vcpu-ubuntu-2404-arm
            platform: linux
            arch: arm64
            binary: result/bin/ccusage
          - name: build-linux-x64
            os: blacksmith-32vcpu-ubuntu-2404
            platform: linux
            arch: x64
            binary: result/bin/ccusage
          - name: build-mac-arm64
            os: blacksmith-12vcpu-macos-26
            platform: darwin
            arch: arm64
            binary: result/bin/ccusage
          - name: build-mac-x64
            os: blacksmith-12vcpu-macos-26
            platform: darwin
            arch: x64
            binary: result/bin/ccusage
          - name: build-windows-arm64
            os: windows-11-arm
            platform: win32
            arch: arm64
            binary: rust/target/release/ccusage.exe
          - name: build-windows-x64
            os: blacksmith-32vcpu-windows-2025
            platform: win32
            arch: x64
            binary: rust/target/release/ccusage.exe

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/build-linux-native-package
        if: matrix.platform == 'linux'
        with:
          arch: ${{ matrix.arch }}
          binary: ${{ matrix.binary }}
          cache-scope: ${{ matrix.name }}
      - uses: ./.github/actions/build-macos-nix-native-package
        if: matrix.platform == 'darwin'
        with:
          arch: ${{ matrix.arch }}
          binary: ${{ matrix.binary }}
          cache-scope: ${{ matrix.name }}
      - uses: ./.github/actions/build-windows-native-package
        if: matrix.platform == 'win32'
        with:
          arch: ${{ matrix.arch }}
          binary: ${{ matrix.binary }}

  npm:
    needs:
      - build-native-packages
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-nix-cache
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          registry-url: 'https://registry.npmjs.org'
          node-version: lts/*
          package-manager-cache: false
      # node comes from setup-node above (needed for the npm registry auth);
      # ensure-native-binary brings Nushell through its Nix shebang.
      - run: nix profile install --inputs-from . nixpkgs#pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ccusage-native-*
          path: ${{ runner.temp }}/native-packages
          merge-multiple: true
      - name: Restore native package binaries
        run: |
          for archive in "$RUNNER_TEMP"/native-packages/*.tar; do
            tar -xf "$archive"
          done
      - run: pnpm --filter='./apps/ccusage' --filter='./packages/ccusage-*' publish --provenance --no-git-checks --access public

  release:
    needs:
      - npm
    runs-on: blacksmith-32vcpu-ubuntu-2404-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-nix-cache
      - run: nix develop --command pnpm changelogithub
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
