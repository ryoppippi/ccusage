name: npm publish

on:
  push:
    tags:
      - '*'

jobs:
  build-native-packages:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: blacksmith-32vcpu-ubuntu-2404-arm
            platform: linux
            arch: arm64
            binary: result/bin/ccusage
          - os: blacksmith-32vcpu-ubuntu-2404
            platform: linux
            arch: x64
            binary: result/bin/ccusage
          - os: blacksmith-12vcpu-macos-26
            platform: darwin
            arch: arm64
            binary: result/bin/ccusage
          - os: macos-15-intel
            platform: darwin
            arch: x64
            binary: result/bin/ccusage
          - os: windows-11-arm
            platform: win32
            arch: arm64
            binary: rust/target/release/ccusage.exe
          - os: blacksmith-32vcpu-windows-2025
            platform: win32
            arch: x64
            binary: rust/target/release/ccusage.exe

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        if: matrix.platform != 'win32'
      - name: Cache Cargo build
        if: matrix.platform == 'win32'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-
      - name: Build Linux static binary
        if: matrix.platform == 'linux'
        run: nix build .#ccusage-static
      - name: Build macOS binary
        if: matrix.platform == 'darwin'
        run: nix build .#ccusage
      - name: Verify Linux binary is static
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          file "${{ matrix.binary }}"
          if ldd "${{ matrix.binary }}" > "$RUNNER_TEMP/ldd.txt" 2>&1; then
            cat "$RUNNER_TEMP/ldd.txt"
            grep -Eiq 'not a dynamic executable|statically linked' "$RUNNER_TEMP/ldd.txt"
          else
            cat "$RUNNER_TEMP/ldd.txt"
            grep -Eiq 'not a dynamic executable|statically linked' "$RUNNER_TEMP/ldd.txt"
          fi
      - name: Build Cargo native binary
        if: matrix.platform == 'win32'
        run: cargo build --manifest-path rust/Cargo.toml --release --bin ccusage
      - run: node apps/ccusage/scripts/stage-native-package.mjs --platform "${{ matrix.platform }}" --arch "${{ matrix.arch }}" --binary "${{ matrix.binary }}"
      - name: Archive native package binary
        shell: bash
        run: tar -cf "ccusage-native-${{ matrix.platform }}-${{ matrix.arch }}.tar" "packages/ccusage-${{ matrix.platform }}-${{ matrix.arch }}/bin"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ccusage-native-${{ matrix.platform }}-${{ matrix.arch }}
          path: ccusage-native-${{ matrix.platform }}-${{ matrix.arch }}.tar
          if-no-files-found: error

  npm-pack:
    needs:
      - build-native-packages
    runs-on: blacksmith-32vcpu-ubuntu-2404-arm
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-nix
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ccusage-native-*
          path: ${{ runner.temp }}/native-packages
          merge-multiple: true
      - name: Restore native package binaries
        run: |
          for archive in "$RUNNER_TEMP"/native-packages/*.tar; do
            tar -xf "$archive"
          done
      - run: nix develop ./dev#ci --command just install
      - name: Pack npm packages
        run: |
          mkdir -p "$RUNNER_TEMP/npm-packages"
          nix develop ./dev#ci --command pnpm --filter='./apps/ccusage' --filter='./packages/ccusage-*' pack --pack-destination "$RUNNER_TEMP/npm-packages"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-packages
          path: ${{ runner.temp }}/npm-packages/*.tgz
          if-no-files-found: error

  npm:
    needs:
      - npm-pack
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          registry-url: 'https://registry.npmjs.org'
          node-version: lts/*
          package-manager-cache: false
      - run: corepack enable pnpm
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-packages
          path: ${{ runner.temp }}/npm-packages
      - name: Publish npm packages
        shell: bash
        run: |
          while IFS= read -r package; do
            pnpm publish "$package" --provenance --no-git-checks --access public
          done < <(find "$RUNNER_TEMP/npm-packages" -name '*.tgz' -type f | sort)

  release:
    needs:
      - npm
    runs-on: blacksmith-32vcpu-ubuntu-2404-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-nix
        with:
          cache-profile: dev
      - run: nix develop ./dev#ci --command just install
      - run: nix develop ./dev#ci --command pnpm changelogithub
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
