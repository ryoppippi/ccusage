name: Contribution Proposal
description: Propose a change or feature before opening a PR
labels: []
body:
  - type: markdown
    attributes:
      value: |
        **Before you start:** Read [CONTRIBUTING.md](https://github.com/ryoppippi/ccusage/blob/main/CONTRIBUTING.md).

        PRs from new contributors are auto-closed unless the contributor has already been approved with `lgtm`.

        Keep this short, concrete, and written in your own voice.

  - type: textarea
    id: what
    attributes:
      label: What do you want to change?
      description: Be specific and concise.
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why?
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: how
    attributes:
      label: How? (optional)
      description: Brief technical approach if you have one in mind.
    validations:
      required: false
